<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ito - 管理画面 ルーム選択</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container { width: 100%; max-width: 400px; text-align: center; }
    .header { display: flex; align-items: baseline; justify-content: center; gap: 0.6rem; margin-bottom: 0.3rem; }
    h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: 0.1em; }
    .badge {
      background: #f0f0f0;
      border-radius: 999px;
      padding: 0.2rem 0.75rem;
      font-size: 0.72rem;
      color: #666;
      font-weight: 500;
    }
    .tagline { font-size: 0.85rem; color: #888; margin-bottom: 2.5rem; }
    .room-label { font-size: 0.75rem; color: #aaa; margin-bottom: 0.9rem; letter-spacing: 0.08em; }
    .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .room-btn {
      display: block;
      background: #fff;
      border: 1px solid #e4e4e0;
      border-radius: 12px;
      padding: 1.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .room-btn:hover { border-color: #aaa; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .room-btn .num { font-size: 2.4rem; font-weight: 800; color: #e03050; display: block; margin-bottom: 0.2rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>ito</h1>
    <span class="badge">進行役</span>
  </div>
  <p class="tagline">管理するルームを選んでください</p>
  <p class="room-label">ROOM SELECT</p>
  <div class="room-grid">
    <a th:each="id : ${roomIds}" th:href="@{/admin/{id}(id=${id})}" class="room-btn">
      <span class="num" th:text="${id}">1</span>
      ルーム <span th:text="${id}">1</span>
    </a>
  </div>
</div>
</body>
</html>
